name: Terraform Drift Detection

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - ${{ vars.TF_WORKSPACE_WEBSITE }}
          - ${{ vars.TF_WORKSPACE_STORYBOOK }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Drift Detection - ${{ matrix.workspace }}
        uses: oaknational/oak-terraform-actions/actions/terraform-vercel-drift@208b99c3e0c742356de5ba33388a0ab89d14e9c7 # v1.11.0
        with:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
          TF_WORKSPACE: ${{ matrix.workspace }}
          VERCEL_DRIFT_DETECTION_SLACK_TOKEN: ${{ secrets.VERCEL_DRIFT_DETECTION_SLACK_TOKEN }}
          VERCEL_DRIFT_DETECTION_SLACK_CHANNEL_ID: ${{ secrets.VERCEL_DRIFT_DETECTION_SLACK_CHANNEL_ID }}